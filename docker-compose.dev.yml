services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: agentops-postgres
    environment:
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: agentops
      POSTGRES_DB: agentops_hub
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops -d agentops_hub"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - agentops_pg_data:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-redis:7}
    container_name: agentops-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3.13-management}
    container_name: agentops-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_HOST_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  agentops_pg_data:
