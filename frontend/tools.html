<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentOps Hub - Tool Catalog</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>AgentOps Hub / Tool Catalog</h1>
    <nav class="nav-links">
      <a href="index.html">Task Creation</a>
      <a href="permissions.html">Permission Config</a>
      <a href="audit.html">Security Audit</a>
    </nav>

    <section class="result-card">
      <label for="statusFilter">Status Filter</label>
      <select id="statusFilter">
        <option value="">all</option>
        <option value="enabled">enabled</option>
        <option value="disabled">disabled</option>
      </select>
      <button id="refreshBtn" type="button">Refresh</button>
    </section>

    <section id="error" class="error"></section>
    <table class="simple-table" id="catalogTable">
      <thead>
      <tr>
        <th>name</th>
        <th>type</th>
        <th>enabled</th>
        <th>requiredScope</th>
        <th>timeout/retry</th>
        <th>safetyPolicy</th>
      </tr>
      </thead>
      <tbody id="catalogBody"></tbody>
    </table>
  </main>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="tools.js"></script>
</body>
</html>
